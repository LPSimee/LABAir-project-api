spring.application.name=labair-api

# 1. to connect to the database
# spring.datasource.url=jdbc:mysql://localhost:3306/labair_db?useSSL=false&allowPublicKeyRetrieval=true?createDatabaseIfNotExist=true
# spring.datasource.username=root
# spring.datasource.password=root

# The SQL dialect makes Hibernate generate better SQL for the chosen database
spring.jpa.properties.hibernate.dialect = org.hibernate.dialect.MySQL5InnoDBDialect

# 2. to automatically create the tables
spring.jpa.hibernate.ddl.auto=update

# 3. optional: to show the SQL queries - query logs
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true